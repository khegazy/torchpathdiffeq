name: lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check --output-format=github torchpathdiffeq/

      - name: Ruff format check
        run: ruff format --check torchpathdiffeq/
